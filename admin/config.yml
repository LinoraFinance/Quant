
backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "global"
    label: "01 Global Website Settings"
    files:
      - file: "content/global.json"
        label: "Global: Brand, Header, Footer, Contacts"
        name: "global_settings"
        fields:
          - { label: "Company Name", name: "company_name", widget: "string" }
          - { label: "Domain", name: "domain", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "SIREN / Registration Number", name: "siren", widget: "string" }
          - { label: "Footer Slogan", name: "footer_slogan", widget: "string", required: false }
          - { label: "Logo Symbol", name: "logo_symbol", widget: "image", required: false }
          - { label: "Logo Wordmark", name: "logo_wordmark", widget: "image", required: false }
          - { label: "Favicon", name: "favicon", widget: "image", required: false }
          - label: "Top Bar Items"
            name: "topbar_items"
            widget: "list"
            field: { label: "Text", name: "text", widget: "string" }
          - label: "Navigation Links"
            name: "navigation"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Style", name: "style", widget: "select", options: ["normal", "button"], default: "normal" }
          - label: "Footer Links"
            name: "footer_links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - { label: "Use Full Custom Header HTML", name: "header_html_enabled", widget: "boolean", default: false, required: false }
          - { label: "Full Header HTML", name: "header_html", widget: "text", required: false }
          - { label: "Use Full Custom Footer HTML", name: "footer_html_enabled", widget: "boolean", default: false, required: false }
          - { label: "Full Footer HTML", name: "footer_html", widget: "text", required: false }
          - { label: "Global Custom CSS", name: "custom_css", widget: "text", required: false }
          - { label: "Custom HEAD HTML", name: "custom_head_html", widget: "text", required: false }
          - { label: "Custom Body Start HTML", name: "custom_body_start_html", widget: "text", required: false }
          - { label: "Custom Body End HTML", name: "custom_body_end_html", widget: "text", required: false }

  - name: "theme"
    label: "02 Theme / Visual Style"
    files:
      - file: "content/theme.json"
        label: "Theme, Colors, Effects"
        name: "theme_settings"
        fields:
          - { label: "Accent Color", name: "accent_color", widget: "string" }
          - { label: "Accent Soft Color", name: "accent_soft", widget: "string" }
          - { label: "Background Color", name: "background_color", widget: "string" }
          - { label: "Text Color", name: "text_color", widget: "string" }
          - { label: "Muted Text Color", name: "muted_text_color", widget: "string" }
          - { label: "Matrix Background Enabled", name: "matrix_enabled", widget: "boolean", default: true }
          - { label: "Matrix Opacity", name: "matrix_opacity", widget: "number", value_type: "float", min: 0, max: 1, step: 0.05 }
          - { label: "Preloader Enabled", name: "preloader_enabled", widget: "boolean", default: true }
          - { label: "Custom Cursor Enabled", name: "cursor_enabled", widget: "boolean", default: true }
          - { label: "UI Sounds Enabled", name: "ui_sounds_enabled", widget: "boolean", default: true }
          - { label: "Card Radius", name: "card_radius", widget: "string", required: false }
          - { label: "Theme Custom CSS", name: "custom_css", widget: "text", required: false }
          - { label: "Notes", name: "custom_css_notes", widget: "text", required: false }


  - name: "images"
    label: "03 Image Manager / All Pictures"
    files:
      - file: "content/images.json"
        label: "All Website Images"
        name: "image_settings"
        fields:
          - { label: "Logo Symbol", name: "logo_symbol", widget: "image", required: false }
          - { label: "Logo Wordmark", name: "logo_wordmark", widget: "image", required: false }
          - { label: "Full Header Logo", name: "header_logo", widget: "image", required: false }
          - { label: "Favicon", name: "favicon", widget: "image", required: false }
          - { label: "Apple Touch Icon", name: "apple_touch_icon", widget: "image", required: false }
          - { label: "Favicon 32x32", name: "favicon_32", widget: "image", required: false }
          - { label: "Hero Background Image", name: "hero_background_image", widget: "image", required: false }
          - { label: "Matrix / Site Background Image", name: "matrix_background_image", widget: "image", required: false }
          - { label: "General Page Background Image", name: "page_background_image", widget: "image", required: false }
          - { label: "Cybersecurity & Infrastructure Image", name: "cybersecurity_image", widget: "image", required: false }
          - { label: "AI Automation & Workflows Image", name: "ai_automation_image", widget: "image", required: false }
          - { label: "Cloud & DevOps Solutions Image", name: "cloud_devops_image", widget: "image", required: false }
          - { label: "Data Analytics & Monitoring Image", name: "data_monitoring_image", widget: "image", required: false }
          - { label: "API Integrations & Connectivity Image", name: "api_integrations_image", widget: "image", required: false }
          - { label: "Managed Support & Maintenance Image", name: "support_maintenance_image", widget: "image", required: false }
          - label: "Advanced Custom Image Rules"
            name: "custom_image_rules"
            widget: "list"
            required: false
            summary: "{{fields.selector}} → {{fields.src}}"
            fields:
              - { label: "CSS Selector", name: "selector", widget: "string", hint: "Example: .hero, .visual-card:nth-of-type(1) img, body" }
              - { label: "Image", name: "src", widget: "image", required: false }
              - { label: "Alt Text", name: "alt", widget: "string", required: false }
              - { label: "Apply As", name: "mode", widget: "select", options: ["image", "background"], default: "image" }

  - name: "pages"
    label: "04 Full Page Editor"
    files:
      - file: "content/pages/index.json"
        label: "Home Page"
        name: "page_index"
        fields:
          - { label: "Browser Page Title", name: "page_title", widget: "string", required: false }
          - { label: "SEO Meta Description", name: "meta_description", widget: "text", required: false }
          - { label: "Use Editable Main HTML", name: "main_html_enabled", widget: "boolean", default: true }
          - { label: "FULL PAGE CONTENT HTML", name: "main_html", widget: "text", required: false }
          - { label: "Page Custom CSS", name: "custom_css", widget: "text", required: false }
          - { label: "Page Custom JavaScript", name: "custom_js", widget: "text", required: false }
      - file: "content/pages/services.json"
        label: "Services Page"
        name: "page_services"
        fields:
          - { label: "Browser Page Title", name: "page_title", widget: "string", required: false }
          - { label: "SEO Meta Description", name: "meta_description", widget: "text", required: false }
          - { label: "Use Editable Main HTML", name: "main_html_enabled", widget: "boolean", default: true }
          - { label: "FULL PAGE CONTENT HTML", name: "main_html", widget: "text", required: false }
          - { label: "Page Custom CSS", name: "custom_css", widget: "text", required: false }
          - { label: "Page Custom JavaScript", name: "custom_js", widget: "text", required: false }
      - file: "content/pages/solutions.json"
        label: "Solutions Page"
        name: "page_solutions"
        fields:
          - { label: "Browser Page Title", name: "page_title", widget: "string", required: false }
          - { label: "SEO Meta Description", name: "meta_description", widget: "text", required: false }
          - { label: "Use Editable Main HTML", name: "main_html_enabled", widget: "boolean", default: true }
          - { label: "FULL PAGE CONTENT HTML", name: "main_html", widget: "text", required: false }
          - { label: "Page Custom CSS", name: "custom_css", widget: "text", required: false }
          - { label: "Page Custom JavaScript", name: "custom_js", widget: "text", required: false }
      - file: "content/pages/cases.json"
        label: "Approach Page"
        name: "page_cases"
        fields:
          - { label: "Browser Page Title", name: "page_title", widget: "string", required: false }
          - { label: "SEO Meta Description", name: "meta_description", widget: "text", required: false }
          - { label: "Use Editable Main HTML", name: "main_html_enabled", widget: "boolean", default: true }
          - { label: "FULL PAGE CONTENT HTML", name: "main_html", widget: "text", required: false }
          - { label: "Page Custom CSS", name: "custom_css", widget: "text", required: false }
          - { label: "Page Custom JavaScript", name: "custom_js", widget: "text", required: false }
      - file: "content/pages/process.json"
        label: "How It Works Page"
        name: "page_process"
        fields:
          - { label: "Browser Page Title", name: "page_title", widget: "string", required: false }
          - { label: "SEO Meta Description", name: "meta_description", widget: "text", required: false }
          - { label: "Use Editable Main HTML", name: "main_html_enabled", widget: "boolean", default: true }
          - { label: "FULL PAGE CONTENT HTML", name: "main_html", widget: "text", required: false }
          - { label: "Page Custom CSS", name: "custom_css", widget: "text", required: false }
          - { label: "Page Custom JavaScript", name: "custom_js", widget: "text", required: false }
      - file: "content/pages/request.json"
        label: "Request Page"
        name: "page_request"
        fields:
          - { label: "Browser Page Title", name: "page_title", widget: "string", required: false }
          - { label: "SEO Meta Description", name: "meta_description", widget: "text", required: false }
          - { label: "Use Editable Main HTML", name: "main_html_enabled", widget: "boolean", default: true }
          - { label: "FULL PAGE CONTENT HTML", name: "main_html", widget: "text", required: false }
          - { label: "Page Custom CSS", name: "custom_css", widget: "text", required: false }
          - { label: "Page Custom JavaScript", name: "custom_js", widget: "text", required: false }
      - file: "content/pages/contact.json"
        label: "Contact Page"
        name: "page_contact"
        fields:
          - { label: "Browser Page Title", name: "page_title", widget: "string", required: false }
          - { label: "SEO Meta Description", name: "meta_description", widget: "text", required: false }
          - { label: "Use Editable Main HTML", name: "main_html_enabled", widget: "boolean", default: true }
          - { label: "FULL PAGE CONTENT HTML", name: "main_html", widget: "text", required: false }
          - { label: "Page Custom CSS", name: "custom_css", widget: "text", required: false }
          - { label: "Page Custom JavaScript", name: "custom_js", widget: "text", required: false }
      - file: "content/pages/privacy.json"
        label: "Privacy Policy Page"
        name: "page_privacy"
        fields:
          - { label: "Browser Page Title", name: "page_title", widget: "string", required: false }
          - { label: "SEO Meta Description", name: "meta_description", widget: "text", required: false }
          - { label: "Use Editable Main HTML", name: "main_html_enabled", widget: "boolean", default: true }
          - { label: "FULL PAGE CONTENT HTML", name: "main_html", widget: "text", required: false }
          - { label: "Page Custom CSS", name: "custom_css", widget: "text", required: false }
          - { label: "Page Custom JavaScript", name: "custom_js", widget: "text", required: false }
      - file: "content/pages/refund.json"
        label: "Refund Policy Page"
        name: "page_refund"
        fields:
          - { label: "Browser Page Title", name: "page_title", widget: "string", required: false }
          - { label: "SEO Meta Description", name: "meta_description", widget: "text", required: false }
          - { label: "Use Editable Main HTML", name: "main_html_enabled", widget: "boolean", default: true }
          - { label: "FULL PAGE CONTENT HTML", name: "main_html", widget: "text", required: false }
          - { label: "Page Custom CSS", name: "custom_css", widget: "text", required: false }
          - { label: "Page Custom JavaScript", name: "custom_js", widget: "text", required: false }
      - file: "content/pages/terms.json"
        label: "Terms Page"
        name: "page_terms"
        fields:
          - { label: "Browser Page Title", name: "page_title", widget: "string", required: false }
          - { label: "SEO Meta Description", name: "meta_description", widget: "text", required: false }
          - { label: "Use Editable Main HTML", name: "main_html_enabled", widget: "boolean", default: true }
          - { label: "FULL PAGE CONTENT HTML", name: "main_html", widget: "text", required: false }
          - { label: "Page Custom CSS", name: "custom_css", widget: "text", required: false }
          - { label: "Page Custom JavaScript", name: "custom_js", widget: "text", required: false }

  - name: "services"
    label: "04 Service Cards"
    files:
      - file: "content/services.json"
        label: "Service Cards / Prices"
        name: "services_list"
        fields:
          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Code", name: "code", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

  - name: "legal"
    label: "06 Legal Text Editor"
    files:
      - file: "content/privacy.md"
        label: "Privacy Policy Markdown"
        name: "privacy"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - file: "content/refund.md"
        label: "Refund Policy Markdown"
        name: "refund"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - file: "content/terms.md"
        label: "Terms Markdown"
        name: "terms"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }


  - name: "advanced"
    label: "99 Advanced / Raw Config Editor"
    files:
      - file: "content/global.json"
        label: "Raw Global JSON"
        name: "raw_global_json"
        fields:
          - { label: "Edit JSON Carefully", name: "raw_note", widget: "hidden", default: "Use the structured Global Settings unless you know JSON." }
      - file: "content/theme.json"
        label: "Raw Theme JSON"
        name: "raw_theme_json"
        fields:
          - { label: "Accent Color", name: "accent_color", widget: "string", required: false }
          - { label: "Theme Custom CSS", name: "custom_css", widget: "code", required: false, default_language: "css" }
      - file: "content/pages/index.json"
        label: "Raw Home Page HTML/CSS/JS"
        name: "raw_home_page"
        fields:
          - { label: "Browser Page Title", name: "page_title", widget: "string", required: false }
          - { label: "SEO Meta Description", name: "meta_description", widget: "text", required: false }
          - { label: "Use Editable Main HTML", name: "main_html_enabled", widget: "boolean", default: true }
          - { label: "FULL PAGE HTML", name: "main_html", widget: "code", required: false, default_language: "html" }
          - { label: "Page CSS", name: "custom_css", widget: "code", required: false, default_language: "css" }
          - { label: "Page JavaScript", name: "custom_js", widget: "code", required: false, default_language: "javascript" }
      - file: "content/pages/services.json"
        label: "Raw Services Page HTML/CSS/JS"
        name: "raw_services_page"
        fields:
          - { label: "Browser Page Title", name: "page_title", widget: "string", required: false }
          - { label: "SEO Meta Description", name: "meta_description", widget: "text", required: false }
          - { label: "Use Editable Main HTML", name: "main_html_enabled", widget: "boolean", default: true }
          - { label: "FULL PAGE HTML", name: "main_html", widget: "code", required: false, default_language: "html" }
          - { label: "Page CSS", name: "custom_css", widget: "code", required: false, default_language: "css" }
          - { label: "Page JavaScript", name: "custom_js", widget: "code", required: false, default_language: "javascript" }
      - file: "content/pages/solutions.json"
        label: "Raw Solutions Page HTML/CSS/JS"
        name: "raw_solutions_page"
        fields:
          - { label: "Browser Page Title", name: "page_title", widget: "string", required: false }
          - { label: "SEO Meta Description", name: "meta_description", widget: "text", required: false }
          - { label: "Use Editable Main HTML", name: "main_html_enabled", widget: "boolean", default: true }
          - { label: "FULL PAGE HTML", name: "main_html", widget: "code", required: false, default_language: "html" }
          - { label: "Page CSS", name: "custom_css", widget: "code", required: false, default_language: "css" }
          - { label: "Page JavaScript", name: "custom_js", widget: "code", required: false, default_language: "javascript" }
