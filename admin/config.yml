backend:
  name: git-gateway
  branch: main
media_folder: assets/uploads
public_folder: /assets/uploads
collections:
- name: global
  label: 01 Global Website Settings
  files:
  - file: content/global.json
    label: 'Global: Brand, Header, Footer, Contacts'
    name: global_settings
    fields:
    - label: Company Name
      name: company_name
      widget: string
      required: false
    - label: Domain
      name: domain
      widget: string
      required: false
    - label: Email
      name: email
      widget: string
      required: false
    - label: Phone
      name: phone
      widget: string
      required: false
    - label: Address
      name: address
      widget: string
      required: false
    - label: SIREN / Registration Number
      name: siren
      widget: string
      required: false
    - label: Footer Slogan
      name: footer_slogan
      widget: string
      required: false
    - label: Logo Symbol
      name: logo_symbol
      widget: image
      required: false
    - label: Logo Wordmark
      name: logo_wordmark
      widget: image
      required: false
    - label: Favicon
      name: favicon
      widget: image
      required: false
    - label: Top Bar Items
      name: topbar_items
      widget: list
      field:
        label: Text
        name: text
        widget: string
        required: false
      required: false
    - label: Navigation Links
      name: navigation
      widget: list
      fields:
      - label: Label
        name: label
        widget: string
        required: false
      - label: URL
        name: url
        widget: string
        required: false
      - label: Style
        name: style
        widget: select
        options:
        - normal
        - button
        default: normal
        required: false
      required: false
    - label: Footer Links
      name: footer_links
      widget: list
      fields:
      - label: Label
        name: label
        widget: string
        required: false
      - label: URL
        name: url
        widget: string
        required: false
      required: false
    - label: Use Full Custom Header HTML
      name: header_html_enabled
      widget: boolean
      default: false
      required: false
    - label: Full Header HTML
      name: header_html
      widget: text
      required: false
    - label: Use Full Custom Footer HTML
      name: footer_html_enabled
      widget: boolean
      default: false
      required: false
    - label: Full Footer HTML
      name: footer_html
      widget: text
      required: false
    - label: Global Custom CSS
      name: custom_css
      widget: text
      required: false
    - label: Custom HEAD HTML
      name: custom_head_html
      widget: text
      required: false
    - label: Custom Body Start HTML
      name: custom_body_start_html
      widget: text
      required: false
    - label: Custom Body End HTML
      name: custom_body_end_html
      widget: text
      required: false
- name: theme
  label: 02 Theme / Visual Style
  files:
  - file: content/theme.json
    label: Theme, Colors, Effects
    name: theme_settings
    fields:
    - label: Accent Color
      name: accent_color
      widget: string
      required: false
    - label: Accent Soft Color
      name: accent_soft
      widget: string
      required: false
    - label: Background Color
      name: background_color
      widget: string
      required: false
    - label: Text Color
      name: text_color
      widget: string
      required: false
    - label: Muted Text Color
      name: muted_text_color
      widget: string
      required: false
    - label: Matrix Background Enabled
      name: matrix_enabled
      widget: boolean
      default: true
      required: false
    - label: Matrix Opacity
      name: matrix_opacity
      widget: number
      value_type: float
      min: 0
      max: 1
      step: 0.05
      required: false
    - label: Preloader Enabled
      name: preloader_enabled
      widget: boolean
      default: true
      required: false
    - label: Custom Cursor Enabled
      name: cursor_enabled
      widget: boolean
      default: true
      required: false
    - label: UI Sounds Enabled
      name: ui_sounds_enabled
      widget: boolean
      default: true
      required: false
    - label: Card Radius
      name: card_radius
      widget: string
      required: false
    - label: Theme Custom CSS
      name: custom_css
      widget: text
      required: false
    - label: Notes
      name: custom_css_notes
      widget: text
      required: false
- name: images
  label: 03 Image Manager / All Pictures
  files:
  - file: content/images.json
    label: All Website Images
    name: image_settings
    fields:
    - label: Logo Symbol
      name: logo_symbol
      widget: image
      required: false
    - label: Logo Wordmark
      name: logo_wordmark
      widget: image
      required: false
    - label: Full Header Logo
      name: header_logo
      widget: image
      required: false
    - label: Favicon
      name: favicon
      widget: image
      required: false
    - label: Apple Touch Icon
      name: apple_touch_icon
      widget: image
      required: false
    - label: Favicon 32x32
      name: favicon_32
      widget: image
      required: false
    - label: Hero Background Image
      name: hero_background_image
      widget: image
      required: false
    - label: Matrix / Site Background Image
      name: matrix_background_image
      widget: image
      required: false
    - label: General Page Background Image
      name: page_background_image
      widget: image
      required: false
    - label: Cybersecurity & Infrastructure Image
      name: cybersecurity_image
      widget: image
      required: false
    - label: AI Automation & Workflows Image
      name: ai_automation_image
      widget: image
      required: false
    - label: Cloud & DevOps Solutions Image
      name: cloud_devops_image
      widget: image
      required: false
    - label: Data Analytics & Monitoring Image
      name: data_monitoring_image
      widget: image
      required: false
    - label: API Integrations & Connectivity Image
      name: api_integrations_image
      widget: image
      required: false
    - label: Managed Support & Maintenance Image
      name: support_maintenance_image
      widget: image
      required: false
    - label: Advanced Custom Image Rules
      name: custom_image_rules
      widget: list
      required: false
      summary: '{{fields.selector}} → {{fields.src}}'
      fields:
      - label: CSS Selector
        name: selector
        widget: string
        hint: 'Example: .hero, .visual-card:nth-of-type(1) img, body'
        required: false
      - label: Image
        name: src
        widget: image
        required: false
      - label: Alt Text
        name: alt
        widget: string
        required: false
      - label: Apply As
        name: mode
        widget: select
        options:
        - image
        - background
        default: image
        required: false
