backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "site"
    label: "Site Settings"
    files:
      - file: "content/site.json"
        label: "Main Website Settings"
        name: "site_settings"
        fields:
          - { label: "Company Name", name: "company_name", widget: "string" }
          - { label: "Website Domain", name: "domain", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "SIREN", name: "siren", widget: "string" }
          - { label: "Hero Kicker", name: "hero_kicker", widget: "string" }
          - { label: "Hero Line 1", name: "hero_line_1", widget: "string" }
          - { label: "Hero Line 2", name: "hero_line_2", widget: "string" }
          - { label: "Hero Line 3", name: "hero_line_3", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }

  - name: "services"
    label: "Services"
    files:
      - file: "content/services.json"
        label: "Services List"
        name: "services_list"
        fields:
          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Code", name: "code", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

  - name: "legal"
    label: "Legal Pages"
    files:
      - file: "content/privacy.md"
        label: "Privacy Policy"
        name: "privacy"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - file: "content/refund.md"
        label: "Refund Policy"
        name: "refund"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - file: "content/terms.md"
        label: "Terms of Service"
        name: "terms"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
